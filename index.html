<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartCare AI 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a14;--sidebar:#0f0f1e;--card:#16162a;--card2:#1c1c34;
    --accent1:#7b6cff;--accent2:#ff3cac;--accent3:#00d4ff;
    --text:#e8e6ff;--muted:#6b6a8a;--user-msg:#3d2e8a;--bot-msg:#16162a;
    --border:rgba(123,108,255,0.18);--glow:rgba(123,108,255,0.25);--radius:14px;
    --font-main:'DM Sans',sans-serif;--font-head:'Space Grotesk',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--font-main);background:var(--bg);color:var(--text);display:flex;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(123,108,255,0.08) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 10% 90%,rgba(255,60,172,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}

  /* ── SIDEBAR ── */
  .sidebar{width:230px;min-width:230px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 12px;gap:12px;position:relative;z-index:2;overflow:hidden;}
  .sidebar-brand{font-family:var(--font-head);font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;padding:4px 6px;}
  .sidebar-brand span{background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  #newChatBtn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;border:none;padding:10px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-main);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:opacity .2s,transform .15s;}
  #newChatBtn:hover{opacity:.88;transform:translateY(-1px);}

  .history-section{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:0;}
  .history-section::-webkit-scrollbar{width:3px;}
  .history-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .history-label{font-size:11px;color:var(--muted);padding:6px 8px 4px;letter-spacing:.05em;text-transform:uppercase;}

  .history-item{padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;position:relative;overflow:hidden;}
  .history-item span.hist-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .history-item:hover{background:var(--card2);color:var(--text);}
  .history-item.active{background:rgba(123,108,255,0.13);color:var(--text);border-left:2px solid var(--accent1);padding-left:8px;}
  .history-item .del-btn{opacity:0;font-size:11px;padding:2px 5px;border-radius:4px;background:rgba(255,60,172,0.15);color:var(--accent2);border:none;cursor:pointer;flex-shrink:0;transition:opacity .15s;}
  .history-item:hover .del-btn{opacity:1;}

  .no-history{font-size:12px;color:var(--muted);padding:6px 10px;font-style:italic;}

  .sidebar-info{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:12px;color:var(--muted);line-height:1.7;}
  .sidebar-info strong{color:var(--text);display:block;margin-bottom:3px;font-size:12px;}

  #logoutBtn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:9px 14px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-main);font-size:12px;display:flex;align-items:center;gap:8px;transition:all .2s;}
  #logoutBtn:hover{border-color:var(--accent2);color:var(--accent2);}

  /* ── MAIN CHAT ── */
  .chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1;}

  .header{background:var(--sidebar);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .header-left{display:flex;align-items:center;gap:10px;}
  .header-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;}
  .header-info .title{font-family:var(--font-head);font-size:14px;font-weight:600;}
  .header-info .subtitle{font-size:11px;color:var(--accent3);display:flex;align-items:center;gap:4px;}
  .online-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse-dot 2s infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}
  .header-user{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:5px 12px;border-radius:20px;}

  .chat-box{flex:1;overflow-y:auto;padding:24px 24px 12px;display:flex;flex-direction:column;gap:10px;}
  .chat-box::-webkit-scrollbar{width:5px;}
  .chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* ── WELCOME ── */
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:40px;min-height:100%;}
  .welcome-icon{font-size:48px;filter:drop-shadow(0 0 20px rgba(123,108,255,0.5));animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .welcome h2{font-family:var(--font-head);font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .welcome p{font-size:13.5px;color:var(--muted);max-width:300px;line-height:1.6;}
  .welcome-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
  .pill{background:var(--card);border:1px solid var(--border);padding:7px 13px;border-radius:20px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .18s;}
  .pill:hover{border-color:var(--accent1);color:var(--text);background:var(--card2);}

  /* ── MESSAGES ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .message-wrap{display:flex;flex-direction:column;gap:3px;animation:fadeUp .22s ease;}
  .message-wrap.user{align-items:flex-end;}
  .message-wrap.bot{align-items:flex-start;}
  .msg-label{font-size:10.5px;color:var(--muted);padding:0 4px;}
  .message{padding:11px 15px;border-radius:var(--radius);max-width:74%;line-height:1.65;font-size:14px;word-wrap:break-word;white-space:pre-wrap;}
  .message.user{background:linear-gradient(135deg,var(--user-msg),#2a1a6a);border:1px solid rgba(123,108,255,0.3);border-bottom-right-radius:4px;color:#ddd8ff;}
  .message.bot{background:var(--bot-msg);border:1px solid var(--border);border-bottom-left-radius:4px;}

  .typing-indicator{display:flex;align-items:center;gap:5px;padding:12px 15px;background:var(--bot-msg);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;max-width:80px;animation:fadeUp .22s ease;}
  .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent1);animation:bounce 1.2s infinite;}
  .typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

  /* ── INPUT ── */
  .input-area{padding:12px 18px;background:var(--sidebar);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  #msg{flex:1;padding:11px 16px;border-radius:24px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font-main);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
  #msg::placeholder{color:var(--muted);}
  #msg:focus{border-color:var(--accent1);box-shadow:0 0 0 3px var(--glow);}
  .icon-btn{width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
  #micBtn{background:var(--card);border:1px solid var(--border);color:var(--muted);}
  #micBtn:hover{border-color:var(--accent1);color:var(--accent1);}
  #micBtn.active{background:rgba(255,60,172,0.15);border-color:var(--accent2);color:var(--accent2);}
  #sendBtn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;box-shadow:0 4px 14px rgba(123,108,255,0.35);}
  #sendBtn:hover{opacity:.88;transform:scale(1.05);}
  #sendBtn:active{transform:scale(.97);}
  #sendBtn:disabled{opacity:.4;transform:none;cursor:not-allowed;}
</style>
</head>
<body>

<!-- ── SIDEBAR ──────────────────────────────────────────────────────── -->
<div class="sidebar">
  <div class="sidebar-brand">❤️ <span>HeartCare AI</span></div>

  <button id="newChatBtn">➕ New Chat</button>

  <div class="history-section">
    <div class="history-label">Chat History</div>
    <div id="historyList"><div class="no-history">No chats yet</div></div>
  </div>

  <div class="sidebar-info">
    <strong>💡 Quick topics</strong>
    Symptoms · Heart attack · Diet · Exercise · Blood pressure · Cholesterol · Medications
  </div>

  <button id="logoutBtn">🚪 Logout</button>
</div>

<!-- ── MAIN CHAT ─────────────────────────────────────────────────────── -->
<div class="chat-container">
  <div class="header">
    <div class="header-left">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <div class="title">HeartCare Assistant</div>
        <div class="subtitle"><div class="online-dot"></div> Online &amp; Ready</div>
      </div>
    </div>
    <div class="header-user" id="userDisplay">—</div>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="msg" type="text" placeholder="Ask about heart health…" autocomplete="off">
    <button class="icon-btn" id="micBtn" type="button">🎤</button>
    <button class="icon-btn" id="sendBtn" type="button">➤</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
const username = localStorage.getItem("user");
if (!username) window.location.href = "login.html";
document.getElementById("userDisplay").innerText = "👤 " + username;

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem("user");
  window.location.href = "login.html";
};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let chats = {};       // { chatId: { title, messages: [{role,text,time}] } }
let activeChatId = null;
let isSending = false;
const STORAGE_KEY = "heartcare_chats_v2_" + username;

// ══════════════════════════════════════════════════════
//  PERSISTENCE  (localStorage)
// ══════════════════════════════════════════════════════
function saveChats() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch(e) {}
}

function loadChats() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) chats = JSON.parse(raw);
  } catch(e) { chats = {}; }
}

// ══════════════════════════════════════════════════════
//  HISTORY SIDEBAR
// ══════════════════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById("historyList");
  const ids = Object.keys(chats).sort((a, b) => b - a); // newest first

  if (!ids.length) {
    list.innerHTML = '<div class="no-history">No chats yet</div>';
    return;
  }

  list.innerHTML = ids.map(id => {
    const c = chats[id];
    const active = id === activeChatId ? "active" : "";
    return `
      <div class="history-item ${active}" onclick="loadChat('${id}')">
        <span style="font-size:13px;flex-shrink:0">💬</span>
        <span class="hist-title">${escHtml(c.title)}</span>
        <button class="del-btn" onclick="deleteChat(event,'${id}')">✕</button>
      </div>`;
  }).join("");
}

// ══════════════════════════════════════════════════════
//  CHAT MANAGEMENT
// ══════════════════════════════════════════════════════
function createNewChat() {
  activeChatId = Date.now().toString();
  chats[activeChatId] = { title: "New Chat", messages: [] };
  saveChats();
  renderHistory();
  renderMessages();
}

function loadChat(id) {
  if (isSending) return;
  activeChatId = id;
  renderHistory();
  renderMessages();
}

function deleteChat(e, id) {
  e.stopPropagation();
  delete chats[id];
  saveChats();
  if (activeChatId === id) {
    const ids = Object.keys(chats).sort((a, b) => b - a);
    if (ids.length) {
      activeChatId = ids[0];
    } else {
      createNewChat();
      return;
    }
  }
  renderHistory();
  renderMessages();
}

// ══════════════════════════════════════════════════════
//  RENDER MESSAGES
// ══════════════════════════════════════════════════════
function renderMessages() {
  const box = document.getElementById("chatBox");
  const msgs = (chats[activeChatId] && chats[activeChatId].messages) || [];

  if (!msgs.length) {
    box.innerHTML = `
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">❤️</div>
        <h2>How can I help you today?</h2>
        <p>Ask me anything about heart health, symptoms, medications, or lifestyle advice.</p>
        <div class="welcome-pills">
          <div class="pill" onclick="quickSend('What are signs of a heart attack?')">🚨 Heart attack signs</div>
          <div class="pill" onclick="quickSend('How to lower blood pressure naturally?')">💊 Lower blood pressure</div>
          <div class="pill" onclick="quickSend('Best exercises for heart health?')">🏃 Heart exercises</div>
          <div class="pill" onclick="quickSend('What is a healthy resting heart rate?')">📊 Resting heart rate</div>
        </div>
      </div>`;
    return;
  }

  box.innerHTML = "";
  msgs.forEach(m => appendMessageEl(m.role, m.text, m.time, false));
  box.scrollTop = box.scrollHeight;
}

function appendMessageEl(role, text, time, animate) {
  animate = animate !== false;
  const box = document.getElementById("chatBox");

  const wrap = document.createElement("div");
  wrap.className = "message-wrap " + role;
  if (!animate) wrap.style.animation = "none";

  const label = document.createElement("div");
  label.className = "msg-label";
  if (role === "user") {
    label.textContent = username + (time ? " · " + time : "");
  } else {
    label.textContent = "HeartCare AI" + (time ? " · " + time : "");
  }

  const bubble = document.createElement("div");
  bubble.className = "message " + role;
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

// ══════════════════════════════════════════════════════
//  TYPING INDICATOR
// ══════════════════════════════════════════════════════
function showTyping() {
  hideTyping();
  const box = document.getElementById("chatBox");
  const el = document.createElement("div");
  el.className = "typing-indicator";
  el.id = "typingIndicator";
  el.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

// ══════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════
document.getElementById("msg").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); send(); }
});
document.getElementById("sendBtn").addEventListener("click", send);
document.getElementById("newChatBtn").onclick = () => createNewChat();

function quickSend(text) {
  document.getElementById("msg").value = text;
  send();
}

function send() {
  if (isSending) return;

  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  // Create a new chat session if none is active
  if (!activeChatId || !chats[activeChatId]) createNewChat();

  isSending = true;
  input.value = "";
  document.getElementById("sendBtn").disabled = true;

  // Remove welcome screen if showing
  const welcome = document.getElementById("welcomeScreen");
  if (welcome) welcome.remove();

  // Timestamp
  const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  // Save user message
  chats[activeChatId].messages.push({ role: "user", text, time: now });

  // Auto-title from first message
  if (chats[activeChatId].messages.length === 1) {
    chats[activeChatId].title = text.length > 35 ? text.slice(0, 35) + "…" : text;
    renderHistory();
  }

  saveChats();
  appendMessageEl("user", text, now);
  showTyping();

  // Build full conversation history to send to Flask (last 20 messages)
  const history = chats[activeChatId].messages
    .slice(-20)
    .map(m => ({
      role: m.role === "user" ? "user" : "assistant",
      content: m.text
    }));

  fetch("http://localhost:5000/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, username, history })
  })
  .then(r => {
    if (!r.ok) throw new Error("Server error " + r.status);
    return r.json();
  })
  .then(data => {
    hideTyping();
    const reply = data.reply || "Sorry, I didn't get a response. Please try again.";
    finishBotReply(reply);
  })
  .catch(() => {
    hideTyping();
    finishBotReply("⚠️ Cannot reach server. Make sure Flask is running on port 5000.");
  });
}

function finishBotReply(text) {
  const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  chats[activeChatId].messages.push({ role: "bot", text, time: now });
  saveChats();
  appendMessageEl("bot", text, now);

  isSending = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("msg").focus();
}

// ══════════════════════════════════════════════════════
//  VOICE INPUT
// ══════════════════════════════════════════════════════
document.getElementById("micBtn").onclick = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Speech recognition not supported. Try Chrome or Edge."); return; }
  const r = new SR();
  r.lang = "en-US";
  r.start();
  const micBtn = document.getElementById("micBtn");
  micBtn.classList.add("active");
  r.onresult = e => {
    document.getElementById("msg").value = e.results[0][0].transcript;
    micBtn.classList.remove("active");
  };
  r.onerror = () => micBtn.classList.remove("active");
  r.onend   = () => micBtn.classList.remove("active");
};

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
loadChats();
const existingIds = Object.keys(chats).sort((a, b) => b - a);
if (existingIds.length) {
  activeChatId = existingIds[0];   // open most recent chat
  renderHistory();
  renderMessages();
} else {
  createNewChat();                  // fresh start
}
</script>
</body>
</html>
